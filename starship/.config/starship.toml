[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
stashed = '*${count}'

[golang]
format = '[$symbol]($style) '
symbol = ' '

[docker_context]
symbol = ' '
disabled = true

[time]
disabled = false

