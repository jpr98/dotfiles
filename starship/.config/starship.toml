add_newline = false
# A minimal left prompt
format = """$directory$character"""
# palette = "catppuccin_mocha"
palette = "calm"
# move the rest of the prompt to the right
right_format = """${custom.git_ahead_base}$all"""
command_timeout = 1000

[character]
vicmd_symbol = "[N] >>>"
success_symbol = '[‚ûú](bold green)'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = 'Ôêò '

[git_state]
disabled = false

[git_metrics]
format = '([+$added]($added_style))|([-$deleted]($deleted_style) )'
disabled = true

[git_commit]
commit_hash_length = 5
format = '[\($hash$tag\)]($style) '
tag_symbol = ''
only_detached = true

[git_status]
format = '([$all_status$ahead_behind]($style))'
conflicted = '=:${count} '
ahead = '‚á°${count}'
behind = '‚á£${count}'
diverged = '‚áï‚á°${ahead_count}‚á£${behind_count}'
untracked = '[?${count}](sky) '
stashed = '[*${count}](teal) '
modified = '[!${count}](yellow) '
staged = '[+${count}](green) '
renamed = '[¬ª${count}](lavender) '
deleted = '[-${count}](red) '
typechanged = '[type:${count}](peach) '

[custom.git_ahead_base]
command = """
base=$(git symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null | sed 's#^origin/##')
if [ -z "$base" ]; then
  if git show-ref --verify --quiet refs/heads/master; then
    base=master
  elif git show-ref --verify --quiet refs/heads/main; then
    base=main
  else
    exit 0
  fi
fi

count=$(git rev-list --count "$base..HEAD" 2>/dev/null)
if [ -z "$count" ] && git show-ref --verify --quiet "refs/remotes/origin/$base"; then
  count=$(git rev-list --count "origin/$base..HEAD" 2>/dev/null)
fi

if [ -n "$count" ] && [ "$count" -gt 0 ]; then
  printf '%s+%s' "$base" "$count"
fi
"""
when = 'git rev-parse --is-inside-work-tree >/dev/null 2>&1'
format = '[$output]($style) '
style = 'bold peach'

[golang]
format = '[$symbol]($style) '
symbol = 'Óòß'

[docker_context]
symbol = 'Ôåà '
disabled = true

[time]
disabled = false


